<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini - Shop feedback</title>
    <link rel="stylesheet" href="../stylesheet/style.css" />
    <link rel="icon" type="image/png" href="../images/favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/notifyx@latest/dist/notifyx.min.css"
    />
</head>
<body>

    <main class="w-full h-screen">
        
      <!-- -----------------nav bar-------------- -->
      <div class="header  z-[5] w-full flex justify-between items-center">
        <div class="logo">
          <h1 id="hover-heading" class="text-[2rem] font-semibold  text-white">
            <a href="../index.html">
              <span class="block  [font-kerning:none] [text-rendering:optimizeLegibility]" id="span-1">MINI SHOP</span>
              <!-- <span aria-hidden="true" class="block [font-kerning:none] [text-rendering:optimizeLegibility]" id="span-2">MINI SHOP</span> -->
            </a>
          </h1>
        </div>
        <ul class="flex text-white gap-5">
          <li
            class="flex justify-center items-center bg-neutral-200/20 cursor-pointer hover:bg-neutral-100/30 duration-300"
          >
            <a href="crateProduct.html">
              <i class="fa-solid fa-plus text-[1.5rem] text-white"></i>
            </a>
          </li>
          <li
            class="flex relative justify-center items-center bg-neutral-200/20 cursor-pointer hover:bg-neutral-100/30 duration-300"
          >
            <a href="cartPrdoucts.html">
              <span
              id="cart-count"
                class="absolute top-[-10px] text-[14px] right-0 bg-red-700 rounded-full flex justify-center items-center font-bold w-[22px] h-[22px]"
                ></span
              >
              <i class="fa-solid fa-cart-arrow-down text-[1.5rem] text-[]"></i>
            </a>
          </li>
        </ul>
      </div>



    </main>

     <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
      integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</body>
</html>
